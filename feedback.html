<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Feedback</title>

<link rel="icon" href="image/kentlogo.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

:root{
    --bg:#0f1115;
    --card:#171a21;
    --border:#23262f;
    --text:#ffffff;
    --accent:#4da3ff;
}

/* LIGHT MODE AUTO */
@media (prefers-color-scheme: light){
    :root{
        --bg:#f4f6fb;
        --card:#ffffff;
        --border:#d9dde7;
        --text:#111827;
        --accent:#2563eb;
    }
}
    
body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--text);
    transition:.4s;
} 

/* HEADER */
header{
    padding:15px 25px;
    background:#12141a;
    border-bottom:1px solid #23262f;
    position:sticky;
    top:0;
    z-index:1000;
}

.back-btn{
    color:white;
    text-decoration:none;
    padding:8px 18px;
    border-radius:30px;
    border:1px solid #3a3f4b;
}
.back-btn:hover{background:#4da3ff}

.admin-badge{
    margin-left:8px;
    font-size:12px;
    padding:3px 8px;
    border-radius:20px;
    background:linear-gradient(90deg,#ffd700,#ffae00);
    color:#000;
    font-weight:700;
    box-shadow:0 0 10px rgba(255,215,0,.8);
    animation:adminGlow 2s infinite alternate;
}

@keyframes adminGlow{
    from{box-shadow:0 0 6px rgba(255,215,0,.5);}
    to{box-shadow:0 0 18px rgba(255,215,0,1);}
}
    
/* DASHBOARD */
.dashboard{
    max-width:1100px;
    margin:auto;
    padding:40px 20px;
    flex:1;
}

.posts-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, 320px);
    gap:22px;
    justify-content:center;
}

/* POST CARD */
.post-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:18px;
    padding:20px;
    transition:.35s cubic-bezier(.22,1,.36,1);
    position:relative;
    word-wrap:break-word;
}

.post-card p{
    display:-webkit-box;
    -webkit-line-clamp:5;
    -webkit-box-orient:vertical;
    overflow:hidden;
}
    
.post-card::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(
        120deg,
        transparent,
        rgba(77,163,255,.15),
        transparent
    );
    opacity:0;
    transition:.4s;
}

.post-card:hover{
    transform:translateY(-8px);
    box-shadow:0 25px 55px rgba(0,0,0,.6);
}

.post-card:hover::after{
    opacity:1;
}

.post-top{
    display:flex;
    gap:12px;
    align-items:center;
}

.avatar{
    width:45px;
    height:45px;
    border-radius:50%;
}

.username{font-weight:600}
.time{font-size:12px;color:#9aa0aa}

.admin-reply{
    margin-top:12px;
    padding:10px;
    background:#0f172a;
    border-left:3px solid #4da3ff;
    border-radius:6px;
}

/* MODAL */
.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.75);
    backdrop-filter:blur(6px);
    display:none;
    justify-content:center;
    align-items:center;
    animation:fadeIn .3s ease;
}

/* animated glowing border */
.modal-content{
    width:92%;
    max-width:420px;
    padding:30px;
    border-radius:20px;
    position:relative;
    background:
        linear-gradient(var(--card),var(--card)) padding-box,
        linear-gradient(120deg,#4da3ff,#00ffd5,#4da3ff) border-box;
    border:2px solid transparent;
    backdrop-filter:blur(18px);
    box-shadow:
        0 0 40px rgba(77,163,255,.25),
        0 20px 70px rgba(0,0,0,.6);
}

@keyframes modalPop{
    from{
        opacity:0;
        transform:scale(.85) translateY(20px);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

.modal-content::after{
    content:"";
    position:absolute;
    inset:0;
    border-radius:20px;
    background:radial-gradient(
        circle at top,
        rgba(77,163,255,.25),
        transparent 60%
    );
    pointer-events:none;
    animation:glowPulse 4s ease-in-out infinite;
}

@keyframes glowPulse{
    0%,100%{opacity:.4;}
    50%{opacity:.9;}
}
input,
textarea{
    display:block;
    width:100%;
    box-sizing:border-box;
    margin:10px 0;
    padding:12px 14px;
    border-radius:10px;
    border:1px solid var(--border);
    background:rgba(0,0,0,.25);
    color:var(--text);
    font-size:14px;
}

textarea{
    width:100%;
    min-height:85px;
    max-height:120px;
    resize:none;
    overflow:auto;
    padding:12px;
    border-radius:10px;
    border:1px solid #2b2f38;
    background:#0f1115;
    color:white;
    font-size:14px;
}

button{
    border:none;
    padding:12px;
    border-radius:30px;
    background:#4da3ff;
    color:white;
    font-weight:600;
    cursor:pointer;
}

.delete-btn{
    background:#ff4d4d;
    margin-top:8px;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(25px)}
to{opacity:1;transform:translateY(0)}
}

.primary-btn{
    width:100%;
    background:linear-gradient(135deg,#4da3ff,#2563eb);
    border:none;
    padding:13px;
    border-radius:12px;
    font-weight:600;
    letter-spacing:.3px;
    transition:.25s;
}

.primary-btn:hover{
    transform:translateY(-1px);
    box-shadow:0 8px 20px rgba(77,163,255,.35);
}

.link-action{
    color:var(--accent);
    cursor:pointer;
    text-decoration:underline;
    font-weight:500;
    transition:.2s;
}

.link-action:hover{
    opacity:.7;
}

.post-actions{
    margin-top:10px;
}

.like-btn{
    background:#1f2937;
    border-radius:20px;
    padding:6px 14px;
    font-size:14px;
    transition:.2s;
}

.like-btn:hover{
    background:#ef4444;
}

.like-btn:active{
    transform:scale(1.25);
}

.google-btn{
    width:100%;
    background:#fff;
    color:#444;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    border-radius:10px;
    padding:10px;
    font-weight:600;
}

.google-btn img{
    width:18px;
}

.post-status{
    font-size:13px;
    margin-bottom:8px;
    min-height:18px;
    color:#ffb020;
    font-weight:500;
}
.post-status.success{
    color:#22c55e;
}
.post-status.error{
    color:#ff4d4d;
}

.delete-icon{
    position:absolute;
    top:12px;
    right:12px;
    cursor:pointer;
    font-size:18px;
    opacity:.7;
    transition:.2s;
}
    
.delete-icon:hover{
    opacity:1;
    transform:scale(1.2);
}

.auth-link{
    cursor:pointer;
    text-decoration:underline;
    font-weight:500;
    transition:.2s;
}

.auth-link:hover{
    color:var(--accent);
}

.star{
    cursor:pointer;
    transition:.2s;
}
.star:hover{
    transform:scale(1.3);
    color:gold;
}
.star.active{
    color:gold;
}
    
</style>
</head>

<body>

<header>
<div style="display:flex; align-items:center; justify-content:space-between;">
    <a href="impact.html" class="back-btn">← Back</a>

    <h2 style="margin:0;">Community Feedback</h2>

    <button onclick="openReviewModal()" 
        style="padding:8px 18px;
               border-radius:30px;
               background:#4da3ff;
               color:white;
               font-weight:600;">
        ⭐ Rate Us
    </button>
</div>
</header>
    
<div class="dashboard">
<div class="posts-grid" id="posts"></div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<div id="reviewBox">
<h3 style="text-align:center;">Rate Us</h3>

<div id="starContainer" style="text-align:center; font-size:28px; margin:15px 0;">
    <span class="star" data-value="1">☆</span>
    <span class="star" data-value="2">☆</span>
    <span class="star" data-value="3">☆</span>
    <span class="star" data-value="4">☆</span>
    <span class="star" data-value="5">☆</span>
</div>

<textarea id="reviewText"
maxlength="300"
placeholder="Write your review (max 300 characters)..."></textarea>

<div style="text-align:right; font-size:12px; opacity:.7;">
    <span id="charCount">0</span>/300
</div>

<button class="primary-btn" onclick="submitReview()">
Submit Review
</button>

<p style="text-align:center;margin-top:12px;">
    <button class="google-btn" onclick="googleLogin()">
        <img src="https://developers.google.com/identity/images/g-logo.png">
        Sign in with Google
    </button>
</p>
</div>
</div>
</div>

<!-- ✅ FIREBASE SCRIPT -->
<script type="module">

/* ================= FIREBASE IMPORT ================= */
import { initializeApp } from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
query,
orderBy,
onSnapshot,
serverTimestamp
} from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth,
GoogleAuthProvider,
signInWithPopup,
signInWithEmailAndPassword,
createUserWithEmailAndPassword,
onAuthStateChanged,
signOut
} from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* ================= FIREBASE CONFIG ================= */
const firebaseConfig = {
  apiKey: "AIzaSyAuYZ68uU9Iw8rN-0Kfm3Wzul2vpJMD6XE",
  authDomain: "kent-da153.firebaseapp.com",
  projectId: "kent-da153",
  storageBucket: "kent-da153.firebasestorage.app",
  messagingSenderId: "386160813839",
  appId: "1:386160813839:web:b3f6e6ca211e9b742b007a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const googleProvider = new GoogleAuthProvider();

let selectedRating = 0;

/* ================= REALTIME POSTS ================= */

const postsContainer = document.getElementById("posts");
const q = query(collection(db,"posts"), orderBy("time","desc"));

let cachedSnapshot = null;

onSnapshot(q,(snapshot)=>{
    cachedSnapshot = snapshot;
    renderPosts(snapshot);
});

window.addEventListener("refreshPosts",()=>{
    if(cachedSnapshot){
        renderPosts(cachedSnapshot);
    }
});

function renderPosts(snapshot){
    postsContainer.innerHTML="";
    snapshot.forEach(docSnap=>{
        const p = docSnap.data();
        const card = document.createElement("div");
        card.className = "post-card";

        card.innerHTML = `
<div class="post-top">
  <img class="avatar"
  src="${p.userPhoto || 'https://cdn-icons-png.flaticon.com/512/7175/7175408.png'}">
  <div>
    <div class="username">
       ${p.name}
       <span style="color:gold; margin-left:6px;">
          ${"★".repeat(p.rating || 0)}
       </span>
    </div>
    <div class="time">
      ${p.time?.toDate().toLocaleString() || ""}
    </div>
  </div>
</div>

<p>${p.text}</p>
`;

        postsContainer.appendChild(card);
    });
}
    
const modalContent = document.querySelector(".modal-content");

modal.addEventListener("click",(e)=>{
    if(!modalContent.contains(e.target)){
        modal.style.display="none";
    }
});

/* ================= GOOGLE LOGIN ================= */
window.googleLogin = async () => {
    await signInWithPopup(auth, googleProvider);
};

onAuthStateChanged(auth,(user)=>{
    currentUser = user;
    modal.style.display="none";

    if(cachedSnapshot){
        renderPosts(cachedSnapshot);
    }
});

const stars = document.querySelectorAll(".star");
const reviewText = document.getElementById("reviewText");
const charCount = document.getElementById("charCount");

stars.forEach(star=>{
    star.addEventListener("click",()=>{
        selectedRating = star.dataset.value;
        updateStars();
    });
});

function updateStars(){
    stars.forEach(star=>{
        star.textContent =
        star.dataset.value <= selectedRating ? "★" : "☆";
    });
}

reviewText.addEventListener("input",()=>{
    charCount.textContent = reviewText.value.length;
});

window.submitReview = async () => {

    if(!auth.currentUser){
        alert("Please sign in with Google first.");
        return;
    }

    if(selectedRating == 0){
        alert("Please select a rating.");
        return;
    }

    const text = reviewText.value.trim();
    if(!text){
        alert("Write something first.");
        return;
    }

    await addDoc(collection(db,"posts"),{
        name: auth.currentUser.displayName,
        userPhoto: auth.currentUser.photoURL,
        rating: Number(selectedRating),
        text:text,
        replies: [],
        time: serverTimestamp()
    });

    modal.style.display="none";
    reviewText.value="";
    selectedRating=0;
    updateStars();
};

window.onload = ()=>{
    modal.style.display="flex";
};
    
</script>
    
<footer style="
text-align:center;
padding:20px;
margin-top:40px;
opacity:.7;
font-size:14px;">

</footer>
    
</body>
</html>
